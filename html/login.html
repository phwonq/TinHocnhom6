<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login - Book Way</title>

        <link rel="stylesheet" href="font-awesome-6.5.1-pro-full/css/all.css" />
        <link rel="stylesheet" href="/spck-bookway-nhom6/css/login.css" />
    </head>

    <body>
        <form id="login-form" class="login-wrapper">
            <fieldset class="login-box">
                <legend class="login-title">Đăng Nhập</legend>

                <label>Email</label>
                <input id="email" type="email" placeholder="example@email.com" />

                <label>Mật khẩu</label>
                <input id="password" type="password" placeholder="••••••••" />

                <button type="submit">Đăng Nhập</button>

                <div class="register-link">
                    Bạn chưa có tài khoản?
                    <a href="/spck-bookway-nhom6/html/register.html">Đăng ký ngay</a>
                </div>
            </fieldset>
        </form>

        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="/spck-bookway-nhom6/js/login.js"></script>
    </body>
</html>
