<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Đăng Ký - Book Way</title>

        <link rel="stylesheet" href="font-awesome-6.5.1-pro-full/css/all.css" />
        <link rel="stylesheet" href="/spck-bookway-nhom6/css/register.css" />
    </head>

    <body>
        <form id="register-form" class="register-wrapper">
            <fieldset class="register-box">
                <legend class="register-title">Đăng Ký</legend>

                <label>Email</label>
                <input id="email" type="email" placeholder="example@email.com" />

                <label>Mật khẩu</label>
                <input id="password" type="password" placeholder="••••••••" />

                <label>Nhập lại mật khẩu</label>
                <input id="repeatPassword" type="password" placeholder="••••••••" />

                <button type="submit">Đăng Ký</button>

                <div class="login-link">
                    Nếu bạn đã có tài khoản,
                    <a href="/spck-bookway-nhom6/html/login.html">Đăng nhập</a>
                </div>
            </fieldset>
        </form>

        <script src="/spck-bookway-nhom6/js/register.js"></script>
    </body>
</html>
