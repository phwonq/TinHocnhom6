<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tạo Bài Đăng Sách</title>

        <link rel="stylesheet" href="font-awesome-6.5.1-pro-full/css/all.css" />
        <link rel="stylesheet" href="/spck-bookway-nhom6/css/create-book.css" />
    </head>

    <body>
        <div class="container">
            <div class="form-header">
                <h2>
                    <i class="fa-solid fa-book"></i>
                    Tạo Bài Đăng Sách Mới
                </h2>
            </div>

            <form class="form-body">
                <div class="row">
                    <div class="form-group">
                        <label>Tên quyển sách</label>
                        <input type="text" id="book-name" placeholder="Ví dụ: Đắc Nhân Tâm" />
                    </div>

                    <div class="form-group">
                        <label>Tên Tác giả</label>
                        <input type="text" id="book-author" placeholder="Ví dụ: Dale Carnegie" />
                    </div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>Giá sách (VNĐ)</label>
                        <div class="input-icon-left">
                            <span>₫</span>
                            <input type="number" id="book-price-original" placeholder="0" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Giảm giá (%)</label>
                        <div class="input-icon-right">
                            <input type="number" min="0" max="100" id="book-price-discount" placeholder="Ví dụ: 20" />
                            <span>%</span>
                        </div>
                    </div>
                </div>
                <div class="form-group">
    <label>Thể loại sách:</label>
    <select id="book-category">
        <option value="">-- Chọn thể loại --</option>
        <option value="Viễn Tưởng">Viễn Tưởng</option>
        <option value="Kinh Dị">Kinh Dị</option>
        <option value="Hành Động">Hành Động</option>
        <option value="Tình Cảm">Tình Cảm</option>
        <option value="Hiện Đại">Hiện Đại</option>
        <option value="Cổ Trang">Cổ Trang</option>
        <option value="Trinh Thám">Trinh Thám</option>
    </select>
   
</div>

                <div class="form-group">
                    <label>Mô tả chi tiết</label>
                    <textarea rows="5" id="book-description" placeholder="Viết nội dung giới thiệu chi tiết về cuốn sách tại đây..."></textarea>
                </div>

                <div class="form-group">
                    <label>Nhập link hình ảnh quyển sách</label>
                    <input type="text" id="book-image" placeholder="Nhập link hình ảnh quyển sách" />
                </div>

                <div class="image-preview">
                    <img src="" id="image-preview" alt="" />
                </div>

                <div class="button-group">
                    <button type="submit" id="btn-create-book" class="btn-primary">Đăng bài</button>
                    <a href="/spck-bookway-nhom6/index.html" class="btn-secondary">Hủy</a>
                </div>
            </form>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="/spck-bookway-nhom6/js/create-book.js"></script>
    </body>
   
</div>
</html>
